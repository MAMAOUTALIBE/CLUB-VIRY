services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL publique injectee au BUILD (inline par Next.js dans le SEO/sitemap/canonical).
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://esvirychatillonfootball.org}
    image: es-viry-football:latest
    container_name: es-viry-football
    restart: unless-stopped
    # Variables d'environnement (NEXT_PUBLIC_SITE_URL, NOTIFICATION_WEBHOOK_URL, etc.)
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - LEADS_DIR=/app/var/leads
    # Les demandes (contact / inscription / recrutement) sont ecrites ici et
    # restent lisibles sur le VPS meme apres une mise a jour du conteneur.
    volumes:
      - ./var/leads:/app/var/leads
    networks:
      - esviry-net
    labels:
      - "traefik.enable=true"
      # Traefik tourne en reseau host : on lui indique le reseau du conteneur a joindre.
      - "traefik.docker.network=esviry-net"
      # Routage HTTPS (le redirect web->websecure est deja global au niveau de Traefik).
      - "traefik.http.routers.esviry.rule=Host(`${SITE_DOMAIN:-esvirychatillonfootball.org}`) || Host(`www.${SITE_DOMAIN:-esvirychatillonfootball.org}`)"
      - "traefik.http.routers.esviry.entrypoints=websecure"
      - "traefik.http.routers.esviry.tls=true"
      - "traefik.http.routers.esviry.tls.certresolver=letsencrypt"
      - "traefik.http.services.esviry.loadbalancer.server.port=3000"

# Reseau dedie au site (convention du VPS : chaque stack a son reseau + traefik.docker.network).
networks:
  esviry-net:
    name: esviry-net
