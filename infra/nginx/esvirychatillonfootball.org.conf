# ===========================================================================
# Reverse-proxy nginx (hôte) -> conteneur Next.js du club (127.0.0.1:8090).
# À déposer sur le VPS dans /etc/nginx/sites-available/ puis activer par symlink
# dans /etc/nginx/sites-enabled/. NE touche PAS aux autres vhosts (lodene, etc.).
#
# Après bascule DNS, le HTTPS est ajouté automatiquement par :
#   certbot --nginx -d esvirychatillonfootball.org -d www.esvirychatillonfootball.org
# (certbot insère les directives listen 443 ssl + le bloc de redirection 80->443).
# ===========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name esvirychatillonfootball.org www.esvirychatillonfootball.org;

    # Galerie / documents : autoriser des uploads raisonnables.
    client_max_body_size 25m;

    # Laisse l'application Next.js poser ses propres en-têtes de sécurité (CSP, HSTS,
    # X-Frame-Options) — défini dans next.config.ts. On ne les duplique pas ici.
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        # En-têtes nécessaires au bon fonctionnement derrière le proxy
        # (URL canoniques, détection same-origin / CSRF, scheme https).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Support du streaming / SSE éventuel et timeouts raisonnables.
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
