name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare production env example
        run: cp .env.production.example .env.local

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://esvirychatillonfootball.org

      - name: Validate Docker Compose
        run: docker compose --env-file .env.local config >/tmp/esviry-compose.yml
